<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Note Taker</title>
  <style>
    :root {
      --bg-color: #9fc9f3;
      --sidebar-bg: #d77ea31e;
      --text-color: #333333;
      --text-muted: #777777;
      --border-color: #e1e4e6;
      --active-item: #eaf2f8;
      --editor-bg: #ffffff;
      --badge-bg: #ebece6;
      --badge-text: #555555;
      --status-color: #27ae60;
    }

    body.dark-mode {
      --bg-color: #121212;
      --sidebar-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --text-muted: #aaaaaa;
      --border-color: #333333;
      --active-item: #2c2c2c;
      --editor-bg: #181818;
      --badge-bg: #333333;
      --badge-text: #aaaaaa;
      --status-color: #2ecc71;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Ubuntu UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    #app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 280px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    #search-bar {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
      margin-top: 10px;
    }

    #note-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .note-item {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .note-item:hover {
      background-color: var(--active-item);
    }

    .note-item.active {
      background-color: var(--active-item);
      font-weight: bold;
    }

    .note-item .note-title-text {
      font-size: 14px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 75%;
    }

    .note-item .note-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    .note-item .pin-badge {
      position: absolute;
      top: 12px;
      right: 35px;
      font-size: 12px;
    }

    .note-item .fav-badge {
      position: absolute;
      top: 12px;
      right: 15px;
      font-size: 12px;
    }

    .category-badge {
      display: inline-block;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 3px;
      background: var(--badge-bg);
      color: var(--badge-text);
      margin-right: 4px;
    }

    .note-item .delete-btn {
      position: absolute;
      bottom: 10px;
      right: 15px;
      border: none;
      background: #e74c3c;
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      display: none;
    }

    .note-item:hover .delete-btn {
      display: block;
    }

    #editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--editor-bg);
      height: 100%;
    }

    .meta-input-group {
      order: 1;
      padding: 10px 15px;
      display: flex;
      gap: 15px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border-color);
    }

    #note-title-input {
      flex: 2;
      font-size: 16px;
      font-weight: bold;
    }

    #note-category-input {
      flex: 1;
    }

    #editor-container {
      order: 2;
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    #editor-textarea {
      flex: 1;
      padding: 20px;
      border: none;
      resize: none;
      outline: none;
      font-size: 14px;
      line-height: 1.6;
    }

    #editor-preview {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      word-break: break-word;
    }

    .toolbar {
      order: 3;
      padding: 10px 15px;
      background-color: var(--sidebar-bg);
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .color-picker-wrapper input[type="color"] {
      padding: 0;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
    }

    button, select, input[type="text"] {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    button:hover {
      background-color: var(--active-item);
    }

    .status-bar {
      order: 4;
      padding: 6px 15px;
      background-color: var(--sidebar-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    #save-status {
      color: var(--status-color);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <div id="sidebar">
      <div class="sidebar-header">
        <button id="new-note-btn" style="width: 100%; margin-bottom: 10px;">+ New Note</button>
        <button id="filter-fav-btn" style="width: 100%; margin-bottom: 10px;">⭐ Show Favorites</button>
        <input type="text" id="search-bar" placeholder="Search notes content or titles...">
      </div>
      <ul id="note-list"></ul>
    </div>

    <div id="editor-panel">
      <div class="meta-input-group">
        <input type="text" id="note-title-input" placeholder="Note Title...">
        <input type="text" id="note-category-input" placeholder="Category (e.g. Work, Ideas)...">
      </div>

      <div id="editor-container">
        <textarea id="editor-textarea" placeholder="Start typing your thoughts here..."></textarea>
        <div id="editor-preview" style="display: none;"></div>
      </div>

      <div class="toolbar">
        <button id="save-btn">📁 Save</button>
        <button id="save-as-btn">💾 Save As...</button>
        <button id="open-file-btn">📂 Open External Text</button>
        <button id="toggle-preview-btn">👁️ Preview Mode</button>
        <button id="pin-btn">📌 Pin Note</button>
        <button id="favorite-btn">⭐ Favorite</button>
        <button id="export-pdf-btn">📄 PDF</button>
        <button id="print-btn">🖨️ Print</button>
        
        <select id="font-family-select">
          <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">System Sans</option>
          <option value="'Courier New', Courier, monospace">Monospace</option>
          <option value="Georgia, serif">Georgia Serif</option>
          <option value="'Lucida Handwriting', cursive">Cursive</option>
          <option value="Impact, Charcoal, sans-serif">Impact</option>
        </select>

        <div class="color-picker-wrapper">
          <span>📝 Text:</span>
          <input type="color" id="text-color-picker" value="#333333">
        </div>

        <div class="color-picker-wrapper">
          <span>🎨 BG:</span>
          <input type="color" id="bg-color-picker" value="#ffffff">
        </div>

        <button id="font-dec-btn">A-</button>
        <button id="font-inc-btn">A+</button>
        <button id="dark-mode-toggle">🌓 Dark Mode</button>
      </div>

      <div class="status-bar">
        <span id="save-status">No changes - already saved</span>
        <span id="word-count">Words: 0 | Characters: 0</span>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
